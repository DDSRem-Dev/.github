name: readme-scribe

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'
  push:
    branches:
      - 'main'
    paths:
      - .github/workflows/readme-scribe.yml
      - profile/README.md.tpl
      - scripts/generate_profile_readme.py
      - scripts/requirements.txt
      - profile/accounts.json

jobs:
  readme-scribe:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      -
        name: Install dependencies
        run: pip install -r scripts/requirements.txt
      -
        name: Generate profile README
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python scripts/generate_profile_readme.py
      -
        name: Clear DDSRem-Dev/.github
        run: |
          sed -i '\|- \[DDSRem-Dev\/\.github\](https:\/\/github\.com\/DDSRem-Dev\/\.github)|d' profile/README.md
      -
        uses: stefanzweifel/git-auto-commit-action@547c1409cec143c754e148a6fbdfa359db836cf6
        with:
          commit_message: 'Update generated README'
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
